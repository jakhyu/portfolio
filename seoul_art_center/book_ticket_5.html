<script>
    // tab
    let tabitem=document.querySelectorAll(".tab");
    let panels=document.querySelectorAll(".tabpanel");

    tabitem.forEach(function(item,idx){
            item.addEventListener("click",function(e){
                e.preventDefault();
                for(let i=0; i<tabitem.length; i++){
                 tabitem[i].classList.remove("active");
                 panels[i].classList.remove("active");
             }
                 this.classList.add("active");
                 panels[idx].classList.add("active");
            })
        })


        // 카드종류
    let tits=document.querySelectorAll(".j_tit");
    let lnbs=document.querySelectorAll(".j_lnb");
        
        console.log(lnbs)
        console.log(tits)

        tits.forEach(function(tit){
            tit.addEventListener("click",function(){
            // lnbs[0].style.display="block";
            if(this.classList.contains("active")===false){
                this.classList.add("active");
                for(let i=0; i<lnbs.length; i++){
                    lnbs[i].style.display="none";
                }
                this.nextElementSibling.style.display="block";
            }
            else{
                this.classList.remove("active");
                this.nextElementSibling.style.display="none";
            }
        })
        })
        // 간편결제
        let el=document.querySelectorAll(".j_pay");
        console.log(el);
        
        el[0].classList.add("active");
        el.forEach(function(btn){
            btn.addEventListener("click",function(){
                for(let i=0; i<el.length; i++){
                    el[i].classList.remove("active");
                    }
                    btn.classList.add("active");
            })
        });
 //<!---------------------------------수정------------------------------------>           
        //팝업 (body 결제하기의 a태그 지워야함)
        let btnpay=document.querySelector(".btnpay");
        let jpopup=document.querySelector(".sec_popup_j")
        let j_yes=document.querySelector(".popup_yes_j")
        let j_no=document.querySelector(".popup_no_j")

        btnpay.addEventListener("click",function(){
            jpopup.classList.add("active");
        })
        j_no.addEventListener("click",function(){
            jpopup.classList.remove("active");
        })
        j_yes.addEventListener("click",function(){
            location.replace("./book_ticket_6.html")
        })
</script>
